<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="88" viewBox="0 0 400 88" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sabtech Workspace horizontal logo, dark variant">
  <title>Sabtech Workspace — Horizontal Primary (Dark)</title>
  <desc>Classic Cube Mark with white SABTECH wordmark and teal WORKSPACE sub-name — for dark backgrounds</desc>

  <!-- Dark background -->
  <rect width="400" height="88" fill="#091545"/>

  <!-- Cube Mark -->
  <g id="cube-mark" transform="translate(16,4)">
    <!-- Top face -->
    <polygon points="40,0 72,18 72,18 40,36 8,18" fill="#2952C8"/>
    <!-- Left face (shadow) -->
    <polygon points="8,18 40,36 40,68 8,50" fill="#1B3580"/>
    <!-- Right face (lit / teal) -->
    <polygon points="72,18 72,50 40,68 40,36" fill="#1D9E75"/>
    <!-- Top face highlight overlay -->
    <polygon points="40,7 66,21 40,35 14,21" fill="#4070E8" opacity="0.4"/>
    <!-- Bottom edge accent -->
    <polygon points="40,36 72,50 72,50 40,56 8,50" fill="#0F6E56" opacity="0.3"/>
  </g>

  <!-- SABTECH wordmark -->
  <text
    x="112" y="40"
    font-family="'Syne', 'Arial Black', sans-serif"
    font-size="30"
    font-weight="800"
    fill="#FFFFFF"
    letter-spacing="1.8"
  >SABTECH</text>

  <!-- WORKSPACE sub-name -->
  <text
    x="113" y="65"
    font-family="'Space Grotesk', 'Arial', sans-serif"
    font-size="17"
    font-weight="500"
    fill="#5DCAA5"
    letter-spacing="5"
  >WORKSPACE</text>
</svg>
