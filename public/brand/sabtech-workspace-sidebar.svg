<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="72" viewBox="0 0 300 72" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sabtech Workspace compact logo with rule, dark variant">
  <title>Sabtech Workspace — Compact with Rule (Dark)</title>
  <desc>Small cube mark, vertical rule, stacked white SABTECH and teal WORKSPACE on navy background — optimised for SaaS sidebar</desc>

  <!-- Dark background -->
  <rect width="300" height="72" fill="#091545"/>

  <!-- Cube Mark -->
  <g id="cube-mark" transform="translate(12,6)">
    <polygon points="28,0 50,12 50,12 28,24 6,12" fill="#2952C8"/>
    <polygon points="6,12 28,24 28,46 6,33" fill="#1B3580"/>
    <polygon points="50,12 50,33 28,46 28,24" fill="#1D9E75"/>
    <polygon points="28,5 46,14 28,23 10,14" fill="#4070E8" opacity="0.4"/>
    <polygon points="28,24 50,33 50,33 28,38 6,33" fill="#0F6E56" opacity="0.3"/>
  </g>

  <!-- Vertical rule -->
  <line x1="78" y1="12" x2="78" y2="60" stroke="rgba(255,255,255,0.14)" stroke-width="1.2"/>

  <!-- SABTECH wordmark -->
  <text
    x="92" y="34"
    font-family="'Syne', 'Arial Black', sans-serif"
    font-size="22"
    font-weight="800"
    fill="#FFFFFF"
    letter-spacing="1.4"
  >SABTECH</text>

  <!-- WORKSPACE sub-name -->
  <text
    x="92" y="57"
    font-family="'Space Grotesk', 'Arial', sans-serif"
    font-size="13"
    font-weight="500"
    fill="#5DCAA5"
    letter-spacing="3.5"
  >WORKSPACE</text>
</svg>
