<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e01c5a"/>
      <stop offset="50%" stop-color="#8b35c1"/>
      <stop offset="100%" stop-color="#7c2cbf"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" stroke="url(#grad)" stroke-width="8" fill="none"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="80" stroke="url(#grad)" stroke-width="4" fill="none"/>
  <!-- S letter -->
  <text x="22" y="130" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="90" font-weight="900" fill="url(#grad)" letter-spacing="-4">S</text>
  <!-- A letter -->
  <text x="62" y="132" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="90" font-weight="900" fill="url(#grad)" letter-spacing="-4">A</text>
  <!-- B letter -->
  <text x="118" y="132" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="90" font-weight="900" fill="url(#grad)" letter-spacing="-4">B</text>
</svg>
